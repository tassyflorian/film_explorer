<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}Film Explorer{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <header>
      <nav>
        <a href="{% url 'film_list_template' %}">Home</a> |
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <footer>
      <p>&copy; {{ year|default:2024 }} Film Explorer</p>
    </footer>
  </body>
</html>
